<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Fighter - Final Pro</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; background: #020617; display: flex; justify-content: center; align-items: center; height: 100vh; color: #f8fafc; font-family: sans-serif; overflow: hidden; }
        
        /* The specific game area */
        #game-container { 
            position: relative; 
            width: 100%; 
            max-width: 450px; 
            height: 100vh; 
            background: #000; 
            overflow: hidden; 
            border: 2px solid #1e293b;
            cursor: crosshair;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #menu { position: absolute; inset: 0; background: #020617; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; gap: 15px; }
        .btn { padding: 12px 30px; font-size: 16px; cursor: pointer; background: #3b82f6; border: none; color: white; border-radius: 8px; width: 200px; font-weight: bold; }
        
        .ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; }
        .stat { background: rgba(15, 23, 42, 0.9); padding: 6px 12px; border-radius: 5px; border: 1px solid #334155; pointer-events: auto; }
        .mini-btn { background: #475569; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="menu">
            <h1 style="color:#3b82f6; margin:0;">GALACTIC FIGHTER</h1>
            <p id="hs-display" style="color:#94a3b8;">Best: 0</p>
            <button class="btn" onclick="startGame(1)">START EASY</button>
            <button class="btn" onclick="startGame(1.8)">START MEDIUM</button>
            <button class="btn" onclick="startGame(2.5)">START HARD</button>
        </div>

        <div class="ui">
            <div class="stat">Score: <span id="score">0</span></div>
            <div style="display:flex; gap:5px; pointer-events:auto;">
                <button id="pause-btn" class="mini-btn" onclick="togglePause()" style="background:#f59e0b">PAUSE</button>
                <button class="mini-btn" onclick="location.reload()">HOME</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const menu = document.getElementById('menu');

        canvas.width = 450;
        canvas.height = 800;

        let score = 0, gameActive = false, isPaused = false, diff = 1;
        let player = { x: 200, y: 700, w: 40, h: 40 };
        let bullets = [], enemies = [], stars = [];
        let spawnTimer = null;

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let bgmOsc = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBGM() {
            if (bgmOsc) return;
            bgmOsc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            bgmOsc.type = 'triangle';
            bgmOsc.frequency.setValueAtTime(60, audioCtx.currentTime); // Low space hum
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime); // Very quiet
            bgmOsc.connect(gain);
            gain.connect(audioCtx.destination);
            bgmOsc.start();
        }

        function playSound(freq, type, duration, vol=0.1) {
            if (!audioCtx || isPaused) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // --- INPUT: FIXED TO CONTAINER AREA ---
        function handleInput(e) {
            if(!gameActive || isPaused) return;
            
            // This calculates the position relative ONLY to the game-container
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            
            // Check if touch/mouse is inside the horizontal bounds of the game
            if (clientX >= rect.left && clientX <= rect.right) {
                const relativeX = clientX - rect.left;
                const scaleX = canvas.width / rect.width;
                player.x = (relativeX * scaleX) - player.w / 2;
                
                // Boundary Lock
                if (player.x < 0) player.x = 0;
                if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
            }
        }

        container.addEventListener('mousemove', handleInput);
        container.addEventListener('touchmove', (e) => {
            if(gameActive) e.preventDefault();
            handleInput(e);
        }, {passive: false});

        // --- GAMEPLAY ---
        document.getElementById('hs-display').innerText = "Best: " + (localStorage.getItem('galacticHS') || 0);
        for(let i=0; i<40; i++) stars.push({x: Math.random()*450, y: Math.random()*800, s: Math.random()*2+1});

        function startGame(d) {
            initAudio();
            playBGM();
            diff = d;
            menu.style.display = 'none';
            gameActive = true; isPaused = false; score = 0;
            bullets = []; enemies = [];
            spawnEnemy();
            requestAnimationFrame(draw);
        }

        function togglePause() {
            if (!gameActive) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE";
            if (!isPaused) { spawnEnemy(); requestAnimationFrame(draw); }
            else { clearTimeout(spawnTimer); }
        }

        function spawnEnemy() {
            if(!gameActive || isPaused) return;
            enemies.push({ x: Math.random()*400, y: -50, w: 40, h: 40, speed: (2.5 + Math.random()) * diff });
            spawnTimer = setTimeout(spawnEnemy, 1000 / diff);
        }

        let lastShot = 0;
        function draw(t) {
            if(!gameActive || isPaused) return;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = '#1e293b';
            stars.forEach(s => { s.y += s.s; if(s.y > 800) s.y = 0; ctx.fillRect(s.x, s.y, 2, 2); });

            // Player
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.moveTo(player.x+20, player.y); ctx.lineTo(player.x, player.y+40); ctx.lineTo(player.x+40, player.y+40);
            ctx.fill();

            // Auto-Shoot
            if(t - lastShot > 250) {
                bullets.push({x: player.x+18, y: player.y, w: 4, h: 15});
                playSound(500, 'sine', 0.08, 0.04);
                lastShot = t;
            }

            // Update Bullets
            ctx.fillStyle = '#10b981';
            bullets.forEach((b, i) => {
                b.y -= 12; ctx.fillRect(b.x, b.y, b.w, b.h);
                if(b.y < -20) bullets.splice(i, 1);
            });

            // Update Enemies
            ctx.fillStyle = '#f43f5e';
            enemies.forEach((en, i) => {
                en.y += en.speed;
                ctx.beginPath();
                ctx.moveTo(en.x+20, en.y); ctx.lineTo(en.x+40, en.y+20); ctx.lineTo(en.x+20, en.y+40); ctx.lineTo(en.x, en.y+20);
                ctx.fill();

                if(en.y > 800) { 
                    gameActive = false;
                    const hs = localStorage.getItem('galacticHS') || 0;
                    if(score > hs) localStorage.setItem('galacticHS', score);
                    alert("MISSION OVER! Score: " + score);
                    location.reload();
                }

                bullets.forEach((b, bi) => {
                    if(b.x < en.x+40 && b.x+4 > en.x && b.y < en.y+40 && b.y+15 > en.y) {
                        playSound(100, 'square', 0.15, 0.08);
                        enemies.splice(i, 1); bullets.splice(bi, 1);
                        score += 10; scoreEl.innerText = score;
                    }
                });
            });

            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-nav">
        <a href="index.html" class="btn-secondary">← Back to Home</a>
    </div>    <section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back, <span>Doctor</span></h2>
            <p>Log in to continue your medical journey.</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="dr.faisal@example.com" required>
                    <small class="error-msg" id="emailError"></small>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <small class="error-msg" id="passError"></small>
                </div>

                <button type="submit" class="btn-primary full-width">Sign In</button>
            </form>
            
            <p class="auth-switch">Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
    </div>
</section>
</body>
</html>

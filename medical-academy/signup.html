<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join MedAcademy | Create Student Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007BFF;
            --secondary: #2C3E50;
            --bg: #F8FAFC;
            --white: #ffffff;
            --error: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { color: var(--secondary); font-size: 1.8rem; }
        .auth-header h2 span { color: var(--primary); }
        .auth-header p { color: #777; font-size: 0.9rem; margin-top: 5px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--secondary); }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }

        .btn-reg {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-reg:hover { background: #0056b3; transform: translateY(-2px); }

        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #666; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .error-hint { color: var(--error); font-size: 0.75rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Med<span>Academy</span></h2>
            <p>Start your professional medical journey today.</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. Faisal Ahmed" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="doctor@example.com" required>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                <span class="error-hint" id="matchError">Passwords do not match!</span>
            </div>

            <button type="submit" class="btn-reg">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const pass = document.getElementById('password');
        const confirmPass = document.getElementById('confirmPassword');
        const matchError = document.getElementById('matchError');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // Check if passwords match
            if (pass.value !== confirmPass.value) {
                matchError.style.display = 'block';
                confirmPass.style.borderColor = '#e74c3c';
                return;
            }

            // Success logic
            alert('Registration Successful! Redirecting to your Dashboard...');
            window.location.href = 'dashboard.html';
        });

        // Hide error when user starts typing again
        confirmPass.addEventListener('input', () => {
            matchError.style.display = 'none';
            confirmPass.style.borderColor = '#ddd';
        });
    </script>

</body>
</html>
